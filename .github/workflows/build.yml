name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  build:
    name: Compile check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.9"
      - name: py_compile
        run: python -m py_compile github-watch.py
